<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marie's Creative Classroom</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --neon-pink: #FF0055;
            --neon-blue: #00FFCC;
            --bg-dark: #121212;
            --panel-bg: #1e1e1e;
            --accent: #FFCC00;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            font-family: "Comic Sans MS", "Chalkboard SE", cursive, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow: hidden;
            height: 100vh;
        }

        /* --- NAVIGATION / SCREENS --- */
        .screen {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .active { display: flex; }

        /* --- SHARED UI --- */
        .card {
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 20px;
            border: 4px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
            text-align: center;
            width: 90%;
            max-width: 800px;
        }

        h1 { font-size: 3.5rem; margin-top: 0; color: var(--neon-pink); text-shadow: 3px 3px #000; }
        h2 { font-size: 1.2rem; opacity: 0.8; margin-bottom: 20px; }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
        }

        .btn {
            padding: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            border: none;
            border-radius: 15px;
            background: var(--neon-pink);
            color: white;
            transition: 0.2s;
            font-family: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .btn:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--neon-pink); }
        .btn-small { padding: 10px 20px; font-size: 1rem; background: #444; border:none; color:white; border-radius:10px; cursor:pointer;}

        /* --- THEME SELECTOR --- */
        .theme-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }

        .theme-item {
            padding: 15px;
            background: #252525;
            border: 2px solid #444;
            border-radius: 10px;
            cursor: pointer;
        }
        .theme-item:hover { border-color: var(--neon-blue); background: #333; }

        /* --- GAME CANVAS AREA --- */
        #game-stage { background: #000; }
        canvas { max-width: 100%; max-height: 60vh; border-radius: 10px; }
        
        .game-controls {
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 50px;
        }

        /* --- HISTORY LIST --- */
        #history-list {
            text-align: left;
            max-height: 300px;
            overflow-y: auto;
            background: #111;
            padding: 15px;
            border-radius: 10px;
        }

        /* --- WINNER OVERLAY --- */
        #winner-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 500;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #winner-name { font-size: 6rem; color: var(--neon-blue); text-shadow: 0 0 20px var(--neon-blue); }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active">
        <h1>Name Picker</h1>
        <h2>Marie's Creative Classroom</h2>
        <div class="card">
            <div class="menu-grid">
                <button class="btn" onclick="showScreen('screen-picker')"><span>🎡</span>NAME PICKER</button>
                <button class="btn" style="background: #3498DB" onclick="showScreen('screen-edit')"><span>📝</span>EDIT LIST</button>
                <button class="btn" style="background: var(--accent); color: black;" onclick="showScreen('screen-history')"><span>📜</span>LIST HISTORY</button>
            </div>
        </div>
    </div>

    <div id="screen-picker" class="screen">
        <button class="btn btn-small" style="position:absolute; top:20px; left:20px" onclick="showScreen('screen-home')">⬅ Home</button>
        <h1>Pick a Theme</h1>
        <div class="card">
            <div id="theme-selection-grid" class="theme-grid"></div>
        </div>
    </div>

    <div id="screen-edit" class="screen">
        <h1>Edit Students</h1>
        <div class="card">
            <textarea id="name-input" style="width:100%; height:150px; padding:10px; border-radius:10px; background:#111; color:white; border:1px solid #555;">Alex, Maria, John, Sarah, Ken, Yuki</textarea>
            <div id="url-container" style="margin: 10px 0; font-size: 0.8rem; word-break: break-all; color: var(--neon-blue);"></div>
            <div style="margin-top:20px; display:flex; gap:10px; justify-content:center;">
                <button class="btn btn-small" onclick="saveNames()">Save & Update</button>
                <button class="btn btn-small" style="background:var(--neon-pink)" onclick="generateLink()">Generate Link</button>
                <button class="btn btn-small" onclick="showScreen('screen-home')">Back</button>
            </div>
        </div>
    </div>

    <div id="screen-history" class="screen">
        <h1>History</h1>
        <div class="card">
            <div id="history-list">No names picked yet this session.</div>
            <button class="btn btn-small" style="margin-top:20px" onclick="showScreen('screen-home')">Back</button>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <button class="btn btn-small" style="position:absolute; top:20px; left:20px" onclick="showScreen('screen-picker')">⬅ Back</button>
        <h2 id="current-theme-title" style="color:var(--neon-blue); font-size: 2rem;">Theme</h2>
        <canvas id="gameCanvas"></canvas>
        
        <div class="game-controls">
            <label style="cursor:pointer; font-size: 1.2rem;">
                <input type="checkbox" id="remove-toggle" checked> Remove after picking
            </label>
            <button class="btn" id="pick-btn" onclick="startPicking()">GO!</button>
        </div>
    </div>

    <div id="winner-overlay" onclick="this.style.display='none'">
        <h3 style="font-size: 2rem;">THE CHOSEN ONE:</h3>
        <div id="winner-name">NAME</div>
        <p>Tap to close</p>
    </div>

    <script>
        // --- DATA STATE ---
        let students = ["Alex", "Maria", "John", "Sarah", "Ken", "Yuki"];
        let pool = [...students];
        let history = [];
        let currentThemeId = "";
        let isAnimating = false;
        let rotation = 0;

        const themes = [
            { id: 'wheel', name: 'Wheel of Names', color: '#FF0055' },
            { id: 'archery', name: 'Bullseye Archery', color: '#E74C3C' },
            { id: 'fishing', name: 'Deep Sea Fishing', color: '#3498DB' },
            { id: 'hacker', name: 'Cyberpunk Hacker', color: '#2ECC71' },
            { id: 'space', name: 'Space Launch', color: '#9B59B6' },
            { id: 'crane', name: 'The Crane Game', color: '#F1C40F' },
            { id: 'sword', name: 'Sword in Stone', color: '#95A5A6' },
            { id: 'vending', name: 'Vending Machine', color: '#E67E22' },
            { id: 'ninja', name: 'Ninja Stars', color: '#2C3E50' },
            { id: 'lava', name: 'Lava Jump', color: '#D35400' }
        ];

        // --- NAVIGATION & URL ---
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'screen-history') updateHistoryUI();
        }

        function generateLink() {
            const val = document.getElementById('name-input').value;
            const url = window.location.origin + window.location.pathname + '?names=' + encodeURIComponent(val);
            document.getElementById('url-container').innerText = url;
            navigator.clipboard.writeText(url);
            alert("URL Copied to Clipboard!");
        }

        function saveNames() {
            const val = document.getElementById('name-input').value;
            students = val.split(',').map(n => n.trim()).filter(n => n !== "");
            pool = [...students];
            alert("List updated!");
            showScreen('screen-home');
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if(params.has('names')) {
                const nameStr = params.get('names');
                document.getElementById('name-input').value = nameStr;
                students = nameStr.split(',').map(n => n.trim()).filter(n => n !== "");
                pool = [...students];
            }
            initThemes();
        };

        // --- THEME SETUP ---
        function initThemes() {
            const grid = document.getElementById('theme-selection-grid');
            grid.innerHTML = "";
            themes.forEach(t => {
                const item = document.createElement('div');
                item.className = 'theme-item';
                item.innerHTML = `<strong>${t.name}</strong>`;
                item.onclick = () => launchGame(t);
                grid.appendChild(item);
            });
        }

        function launchGame(theme) {
            currentThemeId = theme.id;
            document.getElementById('current-theme-title').innerText = theme.name;
            document.getElementById('current-theme-title').style.color = theme.color;
            showScreen('screen-game');
            setupCanvas();
        }

        // --- GAME LOGIC ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function setupCanvas() {
            canvas.width = 600;
            canvas.height = 400;
            rotation = 0;
            drawWheel(0);
        }

        function drawWheel(angle) {
            ctx.clearRect(0,0,600,400);
            const centerX = 300, centerY = 200, radius = 160;
            const sliceAngle = (Math.PI * 2) / pool.length;

            pool.forEach((name, i) => {
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + i * sliceAngle);
                
                // Draw Slice
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, radius, 0, sliceAngle);
                ctx.fillStyle = i % 2 === 0 ? '#FF0055' : '#00FFCC';
                ctx.fill();
                ctx.stroke();

                // Draw Name
                ctx.fillStyle = "white";
                ctx.font = "bold 16px Arial";
                ctx.textAlign = "right";
                ctx.rotate(sliceAngle / 2);
                ctx.fillText(name, radius - 10, 5);
                ctx.restore();
            });

            // Pointer
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.moveTo(centerX + radius + 10, centerY);
            ctx.lineTo(centerX + radius + 30, centerY - 15);
            ctx.lineTo(centerX + radius + 30, centerY + 15);
            ctx.fill();
        }

        async function startPicking() {
            if (isAnimating || pool.length === 0) return;
            isAnimating = true;
            
            const winnerIdx = Math.floor(Math.random() * pool.length);
            const winner = pool[winnerIdx];

            await runAnimationLoop(currentThemeId, winnerIdx);

            if (document.getElementById('remove-toggle').checked) {
                pool.splice(winnerIdx, 1);
            }
            
            history.push(winner);
            showWinner(winner);
            isAnimating = false;
        }

        function runAnimationLoop(id, winnerIdx) {
            return new Promise(resolve => {
                let frames = 0;
                let totalFrames = 120;
                let currentAngle = rotation;
                const sliceAngle = (Math.PI * 2) / pool.length;
                // Target angle to align winner with pointer
                const targetAngle = (Math.PI * 2 * 5) - (winnerIdx * sliceAngle) - (sliceAngle / 2);

                const anim = () => {
                    frames++;
                    let progress = frames / totalFrames;
                    let ease = 1 - Math.pow(1 - progress, 3); // Cubic ease out
                    
                    if(id === 'wheel') {
                        let drawAngle = currentAngle + (targetAngle * ease);
                        drawWheel(drawAngle);
                        rotation = drawAngle;
                    } else {
                        // Generic animated feedback for other themes
                        ctx.clearRect(0,0,600,400);
                        ctx.fillStyle = "white";
                        ctx.font = "30px Comic Sans MS";
                        ctx.textAlign = "center";
                        ctx.fillText("RANDOMIZING...", 300, 200);
                        ctx.strokeStyle = varColor('--neon-blue');
                        ctx.lineWidth = 10;
                        ctx.beginPath(); ctx.arc(300, 200, 80, 0, progress * Math.PI * 2); ctx.stroke();
                    }

                    if (frames < totalFrames) requestAnimationFrame(anim);
                    else resolve();
                };
                anim();
            });
        }

        function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

        function showWinner(name) {
            document.getElementById('winner-name').innerText = name;
            document.getElementById('winner-overlay').style.display = 'flex';
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }

        function updateHistoryUI() {
            const list = document.getElementById('history-list');
            list.innerHTML = history.length === 0 ? "No names picked yet." : 
                history.map((n, i) => `<div>${i+1}. <strong>${n}</strong></div>`).reverse().join('');
        }
    </script>
</body>
</html>
